<!DOCTYPE html>
<html>
<head>
    <title>AI Screen Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>AI Recorder</h2>

        <button id="start">Start Recording</button>
        <button id="stop">Stop Recording</button>
        <button id="historyBtn">View History</button>

        <p id="status">Status: Idle</p>

        <div id="loader" style="display:none;"> Processing...
        </div>

        <div id="resultBox">
            <h3>AI Analysis</h3>
            <p id="result">No data yet</p>
        </div>

        <video id="preview" controls style="width:100%; display:none;"></video>
    </div>

    <script src="popup.js"></script>
</body>
</html>
