<!DOCTYPE html>
<html>
<head>
    <title>AI Screen Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>AI Recorder</h2>

        <button id="start">Start Recording</button>
        <button id="stop">Stop Recording</button>
        <button id="historyBtn">View History</button>

        <p id="status">Status: Idle</p>

        <div id="loader" style="display:none;"> Processing...
        </div>

        <div id="resultBox">
            <h3>AI Analysis</h3>
            <p id="result">No data yet</p>
        </div>

        <video id="preview" controls style="width:100%; display:none;"></video>
    </div>

    <!-- <div class="card">
        <h3> Timeline</h3>
        <div class="timeline">
            ${timelineHTML}
        </div>
    </div> -->

    <hr>
    <h3> Analytics</h3>
    <canvas id="appChart" style="width:100%; height:200px;"></canvas>
    <div id="summary"></div>
    <button id="loadAnalytics">Load Analytics</button>

    <script src="chart.min.js"></script>
    <script src="popup.js"></script>
    
</body>
</html>
